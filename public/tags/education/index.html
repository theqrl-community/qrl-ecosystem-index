        <button class="theme-toggle" type="button" role="switch" aria-label="Dark mode" aria-checked="true" title="Switch theme" data-theme-toggle>
            <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">

            </svg>
        </button>
    </footer>
    <script>
    (() => {
        const button = document.querySelector("[data-theme-toggle]");
        const root = document.documentElement;

        if (!button) {
            return;
        }

        const prefersLight = window.matchMedia("(prefers-color-scheme: light)");
        const currentTheme = () => root.dataset.theme || (prefersLight.matches ? "light" : "dark");
        const syncButton = () => {
            const isDark = currentTheme() === "dark";
            button.setAttribute("aria-checked", String(isDark));
            button.title = isDark ? "Switch to light mode" : "Switch to dark mode";
        };

        button.addEventListener("click", () => {
            const nextTheme = currentTheme() === "dark" ? "light" : "dark";
            root.dataset.theme = nextTheme;

            try {
                localStorage.setItem("qrl-theme", nextTheme);
            } catch (error) {}

            syncButton();
        });

        const handlePreferenceChange = () => {
            if (!root.dataset.theme) {
                syncButton();
            }
        };

        if (typeof prefersLight.addEventListener === "function") {
            prefersLight.addEventListener("change", handlePreferenceChange);
        } else if (typeof prefersLight.addListener === "function") {
            prefersLight.addListener(handlePreferenceChange);
        }

        syncButton();
    })();
    </script>
