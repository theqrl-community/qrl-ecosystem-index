long_description: |
  QRL Hub is a community-maintained resource website for learning about QRL,
  quantum computing threats, blockchain security, and the quantum-resistant
  future of cryptocurrency. The site includes educational pages, FAQs, quantum
  news, QRL 2.0 information, and links to the official QRL website.

  QRL Hub states that it is not associated with the QRL Foundation and provides
  educational content only.

