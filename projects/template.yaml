# Template for QRL Ecosystem Project Submission
# Copy this file to projects/active/<your-project-id>.yaml
# (or projects/archived/ for inactive projects)
# and fill out all required fields.

id: your-project-id
name: Your Project Name
project_type: dapp  # Options: dapp, application, infrastructure, tooling, community (See CONTRIBUTING.md)
status: development  # Options: development, production, archived (see CONTRIBUTING.md)
description: >
  A brief description of your project (max 280 characters).
category: defi  # Options: defi, nft, wallet, explorer, infrastructure, tooling, dao, gaming, identity, oracle, bridge, social, educational, news
tags:
  - tag1
  - tag2
author: Your Name or Organization
license: MIT  # SPDX license identifier
created: YYYY-MM-DD  # ISO 8601 date
updated: YYYY-MM-DD  # ISO 8601 date

# Optional fields
url: https://your-project.example.com
github: https://github.com/your-org/your-repo
docs: https://docs.your-project.example.com
discord: https://discord.gg/your-invite
twitter: https://twitter.com/your-handle

open_source: true
audited: false
# audits:
#   - auditor: Example Security
#     audit_url: https://security.example.com/audit

# Platform-specific destinations. Mark one as default for project cards,
# listings, and generated indexes. Keep url/github above as fallbacks.
#clients:
#  - platform: web
#    url: https://your-project.example.com
#    github: https://github.com/your-org/your-web-client
#    default: true
#  - platform: android
#    url: https://play.google.com/store/apps/details?id=example
#    github: https://github.com/your-org/your-android-client

# Logo (local files only - no external URLs for security)
# Place logo files in images/logos/<project-id>/ and reference them here
#logo: your-project/icon.png

# Logos (full format for multiple variants)
#logos:
#  - path: your-project/icon.png
#    description: Project icon (recommended: 128x128 or 256x256)
#  - path: your-project/logo-full.svg
#    description: Full-width logo variant

# Screenshots (local PNG, JPEG, or WebP files only; 2 MB maximum each)
# Place files in images/screenshots/<project-id>/ and list the best image first.
#screenshots:
#  - path: your-project/main-dashboard.webp
#    caption: Main dashboard showing current network activity
#  - path: your-project/transaction-details.png
#    caption: Transaction details and confirmation status

features:
  - Feature 1
  - Feature 2
  - Feature 3

long_description: |
  Provide a more detailed description of your project here.
  This can include markdown formatting.

# Type-specific block (only include ONE matching your project_type)
dapp:
  network: testnet  # Options: mainnet, testnet
  contract_address: "Q0000..."
  token: "TOKEN"

application:
  platforms:  # e.g., linux, windows, macos, android, ios, web, hardware
    - web
  supported_networks:  # e.g., mainnet, testnet
    - testnet

infrastructure:
  supported_networks:  # e.g., mainnet, testnet
    - testnet
  endpoints:
    - https://api.example.com

tooling:
  languages:  # e.g., python, javascript, go, rust
    - python

community:
  platforms:  # e.g., discord, telegram, forum
    - discord
  language: English
